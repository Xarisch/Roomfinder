<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roomfinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <header>
    <h1>ROOMFINDER</h1>
    <span id="current-date"></span>
  </header>

  <main>

    <section class="controls">

      <div class="control-group">
        <label>Tag</label>
        <div class="btn-group" id="day-selector">
          <button class="active" data-days="0">Heute</button>
          <button data-days="1">Morgen</button>
          <button data-days="2">Übermorgen</button>
        </div>
      </div>

      <div class="control-group">
        <label>Anzeigen</label>
        <div class="btn-group" id="filter-selector">
          <button class="active" data-free="true">Nur freie</button>
          <button data-free="false">Alle Räume</button>
        </div>
      </div>

      <div class="control-group">
        <label>Ansicht</label>
        <div class="btn-group" id="view-selector">
          <button class="active" data-view="all">Alle Räume</button>
          <button data-view="building">Nach Gebäude</button>
          <button data-view="room">Raumsuche</button>
        </div>
      </div>

    </section>

    <!-- Building search (only in building-view) -->
    <section class="search-bar" id="building-search-section" style="display:none;">
      <input type="text" id="building-input" placeholder="z.B.  A  oder  Bauteil A" />
      <button id="building-search-btn">Suchen</button>
    </section>

    <!-- Room search (only in room-view) -->
    <section class="search-bar" id="room-search-section" style="display:none;">
      <input type="text" id="room-input" placeholder="z.B.  A110" />
      <button id="room-search-btn">Suchen</button>
    </section>

    <div class="status-bar">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Bereit</span>
    </div>

    <div id="room-result"></div>
    <div id="buildings-container"></div>

  </main>

  <script src="./js/app.js"></script>
</body>
</html>
