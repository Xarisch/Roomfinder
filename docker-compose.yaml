services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: roomfinder-backend
    user: "${UID}:${GID}"
    volumes: 
      - ./backend:/app
    ports:
      - "8000:8000"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roomfinder-frontend
    ports:
        - "3000:80"